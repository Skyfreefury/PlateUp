<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <button class="mobile-menu-btn" id="burger-btn" aria-label="Menú">
        <svg viewBox="0 0 100 80" width="24" height="24" fill="var(--gold)">
            <rect width="100" height="10" rx="5"></rect>
            <rect y="35" width="100" height="10" rx="5"></rect>
            <rect y="70" width="100" height="10" rx="5"></rect>
        </svg>
    </button>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Comandas</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}" style="color: var(--gold);">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Volver al Inicio</button>
</nav>

<section class="dashboard-section reveal">
    <div class="dashboard-grid">
        <div class="card" style="background: var(--dark); padding: 40px; border: 1px solid var(--border);">
            <span class="section-tag">Registro</span>
            <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 30px; font-weight: 300;">Nuevo <em>Cliente</em></h3>
            
            <form th:action="@{/clientes/guardar}" method="post" th:object="${cliente}" class="reserva-form">
                <div class="form-group">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" th:field="*{nombre}" class="form-input" required placeholder="Ej. Juan Pérez" />
                </div>
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" th:field="*{email}" class="form-input" required placeholder="correo@ejemplo.com" />
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-input" placeholder="+34 600 000 000" />
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px; width: 100%;"><span>Registrar Cliente</span></button>
            </form>
        </div>

        <div>
            <span class="section-tag">Base de Datos</span>
            <h2 class="section-title" style="font-size: 36px;">Cartera de <em>Clientes</em></h2>
            <table class="solstice-table">
                <thead>
                    <tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th style="text-align: right;">Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.nombre}">Nombre</td>
                        <td th:text="${cliente.email}" style="color: var(--text-muted);">Email</td>
                        <td th:text="${cliente.telefono}">Teléfono</td>
                        <td style="text-align: right;">
                            <div class="action-buttons">
                                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn-icon btn-edit" title="Editar">
                                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                </a>
                                <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" class="btn-icon btn-delete" title="Borrar">
                                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
      const burgerBtn = document.getElementById('burger-btn');
      const navLinks = document.getElementById('nav-links');
      if (burgerBtn && navLinks) { burgerBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); }); }
  });
</script>
</body>
</html>
