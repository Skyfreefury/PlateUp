<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes | PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">🍽️ PlateUp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">🏠 Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/mesas}">🪑 Mesas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/pedidos}">🧾 Pedidos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/comandas}">🍳 Comandas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/productos}">🍔 Carta</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/clientes}">👥 Clientes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        
        <div th:if="${param.exito}" class="alert alert-success alert-dismissible fade show shadow-sm">
            ✅ Cliente guardado correctamente.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.borrado}" class="alert alert-danger alert-dismissible fade show shadow-sm">
            🗑️ Cliente eliminado de la base de datos.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="h5 mb-0">➕ Nuevo Cliente</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/clientes/guardar}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre Completo:</label>
                                <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Teléfono:</label>
                                <input type="text" name="telefono" class="form-control" placeholder="600 000 000" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email:</label>
                                <input type="email" name="email" class="form-control" placeholder="juan@email.com" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 shadow-sm">Registrar Cliente</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h4 class="h5 mb-0 text-dark">📋 Listado de Clientes</h4>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Teléfono</th>
                                        <th>Email</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cliente : ${clientes}">
                                        <td class="fw-bold" th:text="${cliente.id}"></td>
                                        <td th:text="${cliente.nombre}"></td>
                                        <td th:text="${cliente.telefono}"></td>
                                        <td th:text="${cliente.email}"></td>
                                        <td class="text-center">
                                            <div class="btn-group shadow-sm">
                                                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm">✏️</a>
                                                <a th:href="@{/clientes/borrar/{id}(id=${cliente.id})}" 
                                                   class="btn btn-danger btn-sm"
                                                   onclick="return confirm('¿Seguro que quieres borrar este cliente?')">🗑️</a>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(clientes)}">
                                        <td colspan="5" class="text-center text-muted py-4">
                                            No hay clientes registrados todavía.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
