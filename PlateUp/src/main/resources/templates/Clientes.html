<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartera de Clientes | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=2.1}">
</head>
<body>

<nav id="navbar" class="scrolled" style="position: relative; z-index: 1000; margin-bottom: 20px;">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Comandas</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}" style="color: var(--gold);">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Volver al Inicio</button>
</nav>

<div class="container-fluid mt-4 reveal" id="main-content">
    <div class="row px-4">
        
        <div class="col-md-3 mb-4">
            <div class="eclipse-panel" style="padding: 2rem;">
                <span class="eclipse-tag">REGISTRO</span>
                <h3 class="eclipse-title" style="font-size: 2rem; margin-bottom: 2rem;">Nuevo <em>Cliente</em></h3>
                
                <form th:action="@{/clientes/guardar}" method="post" th:object="${cliente}">
                    <div class="form-group mb-4">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" th:field="*{nombre}" class="form-input" required />
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" th:field="*{email}" class="form-input" required />
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-input" />
                    </div>
                    <button type="submit" class="btn-gold-solid w-100">REGISTRAR CLIENTE</button>
                </form>
            </div>
        </div>

        <div class="col-md-9">
            <h2 class="eclipse-title">Cartera de <em>Clientes</em></h2>
            
            <div class="table-responsive">
                <table class="table eclipse-table">
                    <thead>
                        <tr>
                            <th>NOMBRE</th>
                            <th>EMAIL</th>
                            <th>TELÉFONO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clientes}">
                            <td style="color: var(--gold);" th:text="${c.nombre}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.telefono}"></td>
                            <td>
                                <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn-icon btn-edit" title="Editar">
                                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                </a>
                                <form th:action="@{/clientes/eliminar/{id}(id=${c.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn-icon btn-delete" title="Borrar" onclick="return confirm('¿Eliminar cliente?')">
                                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => document.getElementById('main-content').classList.add('visible'), 100);
    });
</script>
</body>
</html>
