<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Plato | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/productos}'|">Volver a la Carta</button>
</nav>

<section class="dashboard-section reveal" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 150px;">
    <div class="card" style="background: var(--dark); padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 500px;">
        <span class="section-tag" style="text-align: center;">Despensa</span>
        <h3 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 32px; margin-bottom: 30px; font-weight: 300; text-align: center;">Modificar <em>Plato</em></h3>
        
        <form th:action="@{/productos/editar/{id}(id=${producto.id})}" th:object="${producto}" method="post" class="reserva-form">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="form-label">Nombre del Plato</label>
                <input type="text" th:field="*{nombre}" class="form-input" required />
            </div>
            <div class="form-group">
                <label class="form-label">Descripción</label>
                <input type="text" th:field="*{descripcion}" class="form-input" />
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Precio (€)</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{categoria}" class="form-select">
                        <option value="Entrante">Entrante</option>
                        <option value="Principal">Principal</option>
                        <option value="Postre">Postre</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <a th:href="@{/productos}" class="btn-secondary" style="width: 50%; text-align: center; text-decoration: none;">Cancelar</a>
                <button type="submit" class="btn-primary" style="width: 50%;"><span>Guardar</span></button>
            </div>
        </form>
    </div>
</section>

</body>
</html>
