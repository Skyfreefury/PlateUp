<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto | PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">🍽️ PlateUp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">🏠 Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/mesas}">🪑 Mesas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/pedidos}">🧾 Pedidos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/comandas}">🍳 Comandas</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" th:href="@{/productos}">🍔 Carta</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/clientes}">👥 Clientes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 500px;">
            <div class="card-header bg-warning text-dark py-3">
                <h3 class="h5 mb-0 fw-bold">✏️ Modificar Producto</h3>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                    
                    <input type="hidden" th:field="*{id}">

                    <input type="hidden" name="tipoComandaId" value="1">

                    <div class="mb-3">
                        <label class="form-label fw-bold">ID del Producto (Visual):</label>
                        <input type="text" th:value="'Producto ID ' + *{id}" class="form-control bg-light text-muted" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre del Plato:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción:</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Precio (€):</label>
                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Categoría (Tipo Producto):</label>
                        <select th:field="*{tipoProductoId}" class="form-select" required>
                            <option value="1">Entrante</option>
                            <option value="2">Principal</option>
                            <option value="3">Postre</option>
                            <option value="4">Bebida</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/productos}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
