<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Añadir/Editar Plato | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=21.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <ul class="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Cocina</a></li>
        <li><a th:href="@{/barra}">Barra</a></li>
        <li><a th:href="@{/productos}" class="text-gold">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
        <li><a th:href="@{/cierre}">Caja</a></li>
    </ul>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn-icon btn-circle">
            <span id="theme-icon">☀️</span>
        </button>
        <button class="nav-cta" onclick="history.back()">Volver Atrás</button>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="nav-cta">🔒 Salir</button>
        </form>
    </div>
</nav>

<section class="reveal visible form-section">
    <div class="card form-card">
        <span class="section-tag text-center">Configuración de Menú</span>
        <h3 class="form-title">Detalles del <em>Plato</em></h3>

        <form th:action="@{/productos/guardar}" method="post" th:object="${producto}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group mb-25">
                <label class="form-label">Nombre del Plato</label>
                <input type="text" th:field="*{nombre}" class="form-input" required />
            </div>

            <div class="form-group mb-25">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-input" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group mb-40">
                        <label class="form-label">Precio (€)</label>
                        <input type="number" step="0.01" min="0" th:field="*{precio}" class="form-input" required />
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group mb-40">
                        <label class="form-label">Categoría</label>
                        <select th:field="*{tipoProductoId}" class="form-input" required>
                            <option value="" disabled selected>-- Selecciona --</option>
                            <option value="1">🥗 Entrante</option>
                            <option value="2">🥩 Principal</option>
                            <option value="3">🍰 Postre</option>
                            <option value="4">🍹 Bebida</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary w-100"><span>Guardar en la Carta</span></button>
        </form>
    </div>
</section>

<div class="toast" id="toast"></div>
<div id="error-msg" th:if="${error}" th:text="${error}" style="display:none"></div>
<script th:src="@{/js/main.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('error-msg');
        if (el) showToast('✖ ' + el.textContent);
    });
</script>
</body>
</html>
