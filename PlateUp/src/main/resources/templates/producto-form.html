<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Añadir/Editar Plato | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=6.0}">
</head>
<body>

<nav id="navbar" class="scrolled" style="position: relative; z-index: 1000; margin-bottom: 20px;">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Comandas</a></li>
        <li><a th:href="@{/productos}" style="color: var(--gold);">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/productos}'|">Volver a la Carta</button>
</nav>

<section class="reveal visible" style="padding: 40px 5%; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    
    <div class="card" style="background: var(--dark); padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
        
        <span class="section-tag" style="text-align: center;">Configuración de Menú</span>
        <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; text-align: center; margin-bottom: 40px; color: var(--white);">
            Detalles del <em>Plato</em>
        </h3>
        
        <form th:action="@{/productos/guardar}" method="post" th:object="${producto}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label">Nombre del Plato</label>
                <input type="text" th:field="*{nombre}" class="form-input" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-input" rows="3" style="resize: none;"></textarea>
            </div>
            
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
                <div class="form-group">
                    <label class="form-label">Precio (€)</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{tipoProductoId}" class="form-input" required>
                        <option value="1">Entrante</option>
                        <option value="2">Plato Fuerte</option>
                        <option value="3">Postre</option>
                        <option value="4">Bebida</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%;"><span>Guardar en la Carta</span></button>
        </form>

    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
