<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Mesa | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top crud-nav">
    <div class="container">
        <a class="navbar-brand nav-logo" th:href="@{/}">ECLIPSE PLATEUP</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto nav-links">
                <li class="nav-item"><a class="nav-link text-gold" th:href="@{/mesas}">MESAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/pedidos}">CUENTAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/comandas}">COMANDAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">CARTA</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="form-card">
                <span class="section-tag">SALA</span>
                <h3 class="form-title">Editar <em class="text-gold">Mesa</em></h3>

                <form th:action="@{/mesas/editar/{id}(id=${mesa.id})}" method="post" th:object="${mesa}">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-4">
                        <label class="form-label">Número de Mesa</label>
                        <input type="number" th:field="*{numero}" class="form-input" required />
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Capacidad (Personas)</label>
                        <input type="number" th:field="*{capacidad}" class="form-input" required />
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Estado</label>
                        <select th:field="*{estado}" class="form-input">
                            <option value="LIBRE">Libre</option>
                            <option value="OCUPADA">Ocupada</option>
                        </select>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary w-50">GUARDAR</button>
                        <a th:href="@{/mesas}" class="btn-secondary w-50 text-center text-decoration-none d-flex align-items-center justify-content-center">CANCELAR</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
