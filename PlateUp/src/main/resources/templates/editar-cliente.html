<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top crud-nav">
    <div class="container">
        <a class="navbar-brand nav-logo" th:href="@{/}">ECLIPSE PLATEUP</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto nav-links">
                <li class="nav-item"><a class="nav-link" th:href="@{/mesas}">MESAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/pedidos}">CUENTAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/comandas}">COMANDAS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">CARTA</a></li>
                <li class="nav-item"><a class="nav-link text-gold" th:href="@{/clientes}">CLIENTES</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="form-card">
                <span class="section-tag">BASE DE DATOS</span>
                <h3 class="form-title">Editar <em class="text-gold">Cliente</em></h3>

                <form th:action="@{/clientes/editar/{id}(id=${cliente.id})}" method="post" th:object="${cliente}">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-4">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" th:field="*{nombre}" class="form-input" required />
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-input" />
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-input" />
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary w-50">GUARDAR</button>
                        <a th:href="@{/clientes}" class="btn-secondary w-50 text-center text-decoration-none d-flex align-items-center justify-content-center">CANCELAR</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
