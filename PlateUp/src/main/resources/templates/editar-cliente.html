<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #0a0a08; color: #f5f2eb;">

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color: #0a0a08; border-bottom: 1px solid #2a2a26;">
    <div class="container">
        <a class="navbar-brand nav-logo" th:href="@{/}" style="font-family: 'Cormorant Garamond', serif; color: #c9a84c; letter-spacing: 0.3em; text-transform: uppercase;">ECLIPSE PLATEUP</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto nav-links" style="gap: 20px;">
                <li class="nav-item"><a class="nav-link text-white" th:href="@{/mesas}" style="font-size: 11px; letter-spacing: 0.2em;">MESAS</a></li>
                <li class="nav-item"><a class="nav-link text-white" th:href="@{/pedidos}" style="font-size: 11px; letter-spacing: 0.2em;">CUENTAS</a></li>
                <li class="nav-item"><a class="nav-link text-white" th:href="@{/comandas}" style="font-size: 11px; letter-spacing: 0.2em;">COMANDAS</a></li>
                <li class="nav-item"><a class="nav-link text-white" th:href="@{/productos}" style="font-size: 11px; letter-spacing: 0.2em;">CARTA</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/clientes}" style="color: #c9a84c; font-size: 11px; letter-spacing: 0.2em;">CLIENTES</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="p-5 shadow-lg" style="background-color: #161614; border: 1px solid #2a2a26;">
                <span style="color: #c9a84c; font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; display: block; margin-bottom: 20px;">BASE DE DATOS</span>
                <h3 class="mb-5" style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: #f5f2eb; font-weight: 300;">Editar <em style="color: #c9a84c; font-style: italic;">Cliente</em></h3>
                
                <form th:action="@{/clientes/editar/{id}(id=${cliente.id})}" method="post" th:object="${cliente}">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="mb-4">
                        <label style="font-size: 9px; letter-spacing: 0.3em; color: #7a7a72; text-transform: uppercase; margin-bottom: 8px; display: block;">Nombre Completo</label>
                        <input type="text" th:field="*{nombre}" class="form-control" style="background-color: #0a0a08; color: #fff; border: 1px solid #2a2a26; border-radius: 0; padding: 14px 16px;" required />
                    </div>
                    
                    <div class="mb-4">
                        <label style="font-size: 9px; letter-spacing: 0.3em; color: #7a7a72; text-transform: uppercase; margin-bottom: 8px; display: block;">Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control" style="background-color: #0a0a08; color: #fff; border: 1px solid #2a2a26; border-radius: 0; padding: 14px 16px;" />
                    </div>
                    
                    <div class="mb-5">
                        <label style="font-size: 9px; letter-spacing: 0.3em; color: #7a7a72; text-transform: uppercase; margin-bottom: 8px; display: block;">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" style="background-color: #0a0a08; color: #fff; border: 1px solid #2a2a26; border-radius: 0; padding: 14px 16px;" />
                    </div>
                    
                    <div class="d-flex gap-3">
                        <button type="submit" class="w-50" style="background-color: #c9a84c; color: #0a0a08; border: none; padding: 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;">GUARDAR</button>
                        <a th:href="@{/clientes}" class="w-50 text-center text-decoration-none d-flex align-items-center justify-content-center" style="background-color: transparent; color: #f5f2eb; border: 1px solid #2a2a26; padding: 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; transition: 0.3s;">CANCELAR</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
