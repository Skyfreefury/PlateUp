<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesas | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=6.2}">
</head>
<body>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}" class="text-gold">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Comandas</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Volver al Inicio</button>
</nav>

<section class="reveal dashboard-container" id="main-content">
    <div class="dashboard-header">
        <div>
            <span class="section-tag">Logística</span>
            <h2 class="section-title m-0">Gestión de <em>Mesas</em></h2>
        </div>
        <div class="header-actions">
            <a th:href="@{/mesas/nuevo}" class="btn-primary btn-link-action">+ Añadir Mesa</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="solstice-table w-100">
            <thead>
                <tr>
                    <th>Nº Mesa</th>
                    <th>Ubicación</th> <th>Capacidad</th>
                    <th>Estado</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${mesas}">
                    <td th:text="'Mesa #' + ${m.numero}" class="text-gold font-medium"></td>
                    <td th:text="${m.ubicacion}"></td> <td th:text="${m.capacidad} + ' pax'"></td>
                    <td>
                        <span th:if="${m.estado == 'LIBRE'}" class="timer-badge timer-green">LIBRE</span>
                        <span th:if="${m.estado == 'OCUPADA'}" class="timer-badge timer-red">OCUPADA</span>
                        <span th:if="${m.estado == 'RESERVADA'}" class="timer-badge timer-yellow">RESERVADA</span>
                    </td>
                    <td class="text-right">
                        <div class="action-buttons">
                            <a th:href="@{/mesas/editar/{id}(id=${m.id})}" class="btn-icon btn-edit"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></a>
                            <a th:href="@{/mesas/borrar/{id}(id=${m.id})}" class="btn-icon btn-delete" onclick="return confirm('¿Eliminar mesa?')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
