<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Mesas | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=2.1}">
</head>
<body>

<nav id="navbar" class="scrolled" style="position: relative; z-index: 1000; margin-bottom: 20px;">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}" style="color: var(--gold);">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Comandas</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Volver al Inicio</button>
</nav>

<div class="container-fluid mt-4 reveal" id="main-content">
    <div class="row px-4">
        
        <div class="col-md-3 mb-4">
            <div class="eclipse-panel" style="padding: 2rem;">
                <span class="eclipse-tag">LOGÍSTICA</span>
                <h3 class="eclipse-title" style="font-size: 2rem; margin-bottom: 2rem;">Añadir <em>Mesa</em></h3>
                
                <form th:action="@{/mesas/guardar}" method="post" th:object="${mesa}">
                    <div class="form-group mb-4">
                        <label class="form-label">Número de Mesa</label>
                        <input type="number" th:field="*{numero}" class="form-input" required />
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Capacidad</label>
                        <input type="number" th:field="*{capacidad}" class="form-input" required />
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Estado</label>
                        <select th:field="*{estado}" class="form-input">
                            <option value="LIBRE">Libre</option>
                            <option value="OCUPADA">Ocupada</option>
                            <option value="RESERVADA">Reservada</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-gold-solid w-100">GUARDAR MESA</button>
                </form>
            </div>
        </div>

        <div class="col-md-9">
            <h2 class="eclipse-title">Gestión de <em>Mesas</em></h2>
            
            <div class="table-responsive">
                <table class="table eclipse-table">
                    <thead>
                        <tr>
                            <th>Nº MESA</th>
                            <th>CAPACIDAD</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${mesas}">
                            <td style="color: var(--gold); font-weight: bold;">Mesa #<span th:text="${m.numero}"></span></td>
                            <td><span th:text="${m.capacidad}"></span> pax</td>
                            <td>
                                <span th:if="${m.estado == 'LIBRE'}" class="timer-badge timer-green">LIBRE</span>
                                <span th:if="${m.estado == 'OCUPADA'}" class="timer-badge timer-red">OCUPADA</span>
                                <span th:if="${m.estado == 'RESERVADA'}" class="timer-badge timer-yellow">RESERVADA</span>
                            </td>
                            <td>
                                <a th:href="@{/mesas/editar/{id}(id=${m.id})}" class="btn-icon btn-edit" title="Editar">
                                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                </a>
                                <form th:action="@{/mesas/eliminar/{id}(id=${m.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn-icon btn-delete" title="Borrar" onclick="return confirm('¿Eliminar mesa?')">
                                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => document.getElementById('main-content').classList.add('visible'), 100);
    });
</script>
</body>
</html>
