<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Panel de gestión de mesas del restaurante Eclipse PlateUp." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Gestión de Mesas | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=11.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>

<header>
<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <ul class="nav-links">
        <li><a th:href="@{/mesas}" class="text-gold">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Cocina</a></li>
        <li><a th:href="@{/barra}">Barra</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
        <li><a th:href="@{/cierre}">Caja</a></li>
    </ul>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn-icon btn-circle" title="Cambiar Tema">
            <span id="theme-icon">☀️</span>
        </button>
        <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Inicio</button>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="nav-cta">🔒 Salir</button>
        </form>
    </div>
</nav>
</header>

<main>
<section class="reveal dashboard-container pt-section" id="main-content">
    
    <div class="dashboard-header reveal">
        <div>
            <span class="section-tag">Distribución de Sala</span>
            <h2 class="section-title m-0">Gestión de <em>Mesas</em></h2>
        </div>
        <div class="header-actions">
            <a th:href="@{/mesas/nuevo}" class="btn-primary btn-link-action">+ Añadir Nueva Mesa</a>
        </div>
    </div>

    <div class="table-responsive reveal">
        <table class="solstice-table w-100">
            <thead>
                <tr>
                    <th>Mesa</th>
                    <th>Ubicación</th>
                    <th>Cliente</th>
                    <th>Estado</th>
                    <th>Capacidad</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${mesas}">
                    <td class="text-gold font-medium" th:text="'Mesa ' + ${m.id}"></td>

                    <td>
                        <span th:if="${m.ubicacion == 'TERRAZA'}" class="badge-ubicacion badge-terraza">Terraza</span>
                        <span th:if="${m.ubicacion == 'SALON'}"   class="badge-ubicacion badge-salon">Salón</span>
                        <span th:unless="${m.ubicacion == 'TERRAZA' or m.ubicacion == 'SALON'}" class="badge-ubicacion">—</span>
                    </td>

                    <td th:with="c=${m.clienteId != null ? clientesMap[m.clienteId] : null}">
                        <span th:if="${c != null}" class="text-gold font-medium" th:text="${c.nombre}">—</span>
                        <span th:unless="${c != null}" class="text-muted">—</span>
                    </td>

                    <td>
                        <span th:text="${m.estado}"
                              th:classappend="${m.estado == 'LIBRE'} ? ' badge-libre' : (${m.estado == 'OCUPADA'} ? ' badge-ocupada' : ' badge-reservada')"
                              class="badge-estado">—</span>
                    </td>

                    <td th:text="${m.capacidad} + ' pax'"></td>

                    <td class="text-right">
                        <div class="action-buttons">
                            <a th:href="@{/mesas/editar/{id}(id=${m.id})}" class="btn-icon btn-edit" title="Editar Mesa">
                                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </a>
                            <a th:href="@{/mesas/borrar/{id}(id=${m.id})}" class="btn-icon btn-delete" onclick="return confirm('¿Estás seguro de que deseas eliminar esta mesa?')" title="Eliminar Mesa">
                                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</main>

<footer>
    <div style="text-align:center; padding:16px; font-size:0.8rem; opacity:0.5;">© 2026 Eclipse PlateUp</div>
</footer>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
