<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cuenta | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/pedidos}'|">Volver a Cuentas</button>
</nav>

<section class="dashboard-section reveal" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 150px;">
    <div class="card" style="background: var(--dark); padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 500px;">
        <span class="section-tag" style="text-align: center;">Servicio</span>
        <h3 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 32px; margin-bottom: 30px; font-weight: 300; text-align: center;">Modificar <em>Cuenta</em></h3>
        
        <form th:action="@{/pedidos/editar/{id}(id=${pedido.id})}" th:object="${pedido}" method="post" class="reserva-form">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="form-label">ID de la Mesa</label>
                <input type="number" th:field="*{mesaId}" class="form-input" required />
            </div>
            <div class="form-group">
                <label class="form-label">ID del Cliente</label>
                <input type="number" th:field="*{clienteId}" class="form-input" required />
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <a th:href="@{/pedidos}" class="btn-secondary" style="width: 50%; text-align: center; text-decoration: none;">Cancelar</a>
                <button type="submit" class="btn-primary" style="width: 50%;"><span>Guardar</span></button>
            </div>
        </form>
    </div>
</section>

</body>
</html>
