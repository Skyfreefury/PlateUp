<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Configurar Mesa | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=11.0}">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/mesas}'|">Volver a Mesas</button>
</nav>

<section class="reveal visible form-section">
    <div class="form-card">
        <span class="section-tag text-center">Logística</span>
        <h3 class="form-title">Configurar <em>Mesa</em></h3>

        <form th:action="@{/mesas/guardar}" method="post" th:object="${mesa}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />

            <div class="form-row mb-25">
                <div class="form-group">
                    <label class="form-label">Número de Mesa</label>
                    <input type="number" th:field="*{numero}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Ubicación</label>
                    <select th:field="*{ubicacion}" class="form-input" required>
                        <option value="SALON">Salón Interior</option>
                        <option value="TERRAZA">Terraza Eclipse</option>
                    </select>
                </div>
            </div>

            <div class="form-row mb-40">
                <div class="form-group">
                    <label class="form-label">Capacidad (Pax)</label>
                    <input type="number" th:field="*{capacidad}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Estado</label>
                    <select th:field="*{estado}" class="form-input" required>
                        <option value="LIBRE">Libre</option>
                        <option value="OCUPADA">Ocupada</option>
                        <option value="RESERVADA">Reservada</option>
                    </select>
                </div>
            </div>

            <div class="form-group mb-40">
                <label class="form-label">Cliente Asignado (Opcional)</label>
                <select th:field="*{clienteId}" class="form-input">
                    <option value="">— Mesa libre / Sin asignar —</option>
                    <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombre}"></option>
                </select>
            </div>

            <button type="submit" class="btn-primary w-100">Guardar Mesa</button>
        </form>
    </div>
</section>

<div class="toast" id="toast"></div>
<div id="error-msg" th:if="${error}" th:text="${error}" style="display:none"></div>
<script th:src="@{/js/main.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('error-msg');
        if (el) showToast('✖ ' + el.textContent);
    });
</script>
</body>
</html>
