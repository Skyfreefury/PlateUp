<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cobrar Cuenta | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=19.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn-icon btn-circle">
            <span id="theme-icon">☀️</span>
        </button>
        <button class="nav-cta" onclick="history.back()">Volver Atrás</button>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="nav-cta">🔒 Salir</button>
        </form>
    </div>
</nav>

<section class="reveal visible form-section">
    <div class="card form-card">
        <span class="section-tag text-center">Facturación</span>
        <h3 class="form-title">Cobrar <em>Cuenta</em></h3>

        <!-- Resumen del pedido -->
        <div class="kpi-grid" style="margin-bottom: 30px;">
            <div class="kpi-card" style="text-align:center;">
                <div class="kpi-title">Ticket</div>
                <p class="kpi-value" style="font-size:1.4rem;"
                   th:text="${pedido.numeroTicket != null} ? '#' + ${pedido.numeroTicket} : 'Ref. #' + ${pedido.id}"></p>
            </div>
            <div class="kpi-card" style="text-align:center;">
                <div class="kpi-title">Mesa</div>
                <p class="kpi-value" style="font-size:1.4rem;" th:text="'Mesa ' + ${pedido.mesaId}"></p>
            </div>
            <div class="kpi-card" style="text-align:center;">
                <div class="kpi-title">Total a Cobrar</div>
                <p class="kpi-value" style="font-size:1.6rem; color: var(--accent);"
                   th:text="${pedido.total != null} ? ${pedido.total} + ' €' : '0.00 €'"></p>
            </div>
        </div>

        <form th:action="@{/pedidos/cobrar}" method="post" class="reserva-form" id="cobrar-form">
            <input type="hidden" name="pedidoId" th:value="${pedido.id}" />

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group mb-25">
                        <label class="form-label">💵 Pago en Efectivo (€)</label>
                        <input type="number" id="efectivo" name="pagoEfectivo"
                               class="form-input" min="0" step="0.01" value="0"
                               th:attr="max=${pedido.total}" />
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group mb-25">
                        <label class="form-label">💳 Pago con Tarjeta (€)</label>
                        <input type="number" id="tarjeta" name="pagoTarjeta"
                               class="form-input" min="0" step="0.01" value="0"
                               th:attr="max=${pedido.total}" />
                    </div>
                </div>
            </div>

            <!-- Indicador de reparto -->
            <div id="reparto-info" style="text-align:center; margin-bottom:20px; font-size:0.95rem; color: var(--text-muted);">
                Restante por asignar: <strong id="restante" style="color: var(--accent);">
                    <span th:text="${pedido.total != null} ? ${pedido.total} + ' €' : '0.00 €'"></span>
                </strong>
            </div>

            <!-- Botones de reparto rápido -->
            <div style="display:flex; gap:10px; margin-bottom:25px; justify-content:center; flex-wrap:wrap;">
                <button type="button" class="btn-outline" onclick="todoEfectivo()">Todo Efectivo</button>
                <button type="button" class="btn-outline" onclick="todoTarjeta()">Todo Tarjeta</button>
            </div>

            <button type="submit" id="btn-cobrar" class="btn-primary w-100">
                <span>✅ Confirmar Cobro</span>
            </button>
        </form>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    const total = /*[[${pedido.total != null ? pedido.total : 0}]]*/ 0;
    const efectivoInput = document.getElementById('efectivo');
    const tarjetaInput  = document.getElementById('tarjeta');
    const restanteEl    = document.getElementById('restante');

    function actualizarRestante() {
        const ef = parseFloat(efectivoInput.value) || 0;
        const ta = parseFloat(tarjetaInput.value)  || 0;
        const resto = Math.round((total - ef - ta) * 100) / 100;
        restanteEl.textContent = resto.toFixed(2) + ' €';
        restanteEl.style.color = Math.abs(resto) < 0.01 ? '#28a745' : 'var(--accent)';
    }

    efectivoInput.addEventListener('input', function () {
        const ef = parseFloat(this.value) || 0;
        tarjetaInput.value = Math.max(0, Math.round((total - ef) * 100) / 100).toFixed(2);
        actualizarRestante();
    });

    tarjetaInput.addEventListener('input', function () {
        const ta = parseFloat(this.value) || 0;
        efectivoInput.value = Math.max(0, Math.round((total - ta) * 100) / 100).toFixed(2);
        actualizarRestante();
    });

    function todoEfectivo() {
        efectivoInput.value = total.toFixed(2);
        tarjetaInput.value  = '0.00';
        actualizarRestante();
    }

    function todoTarjeta() {
        tarjetaInput.value  = total.toFixed(2);
        efectivoInput.value = '0.00';
        actualizarRestante();
    }

    // Inicializar con todo en efectivo por defecto
    todoEfectivo();
</script>
</body>
</html>
