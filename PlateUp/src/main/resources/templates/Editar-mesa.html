<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Mesa | PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">🍽️ PlateUp</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" th:href="@{/mesas}">Mesas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/carta}">Carta</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/clientes}">Clientes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 500px;">
            <div class="card-header bg-warning text-dark py-3">
                <h3 class="h5 mb-0 fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Modificar Configuración de Mesa</h3>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/mesas/guardar}" th:object="${mesa}" method="post">
                    
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{numero}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nº de Mesa (Visual):</label>
                        <input type="text" th:value="'Mesa ' + *{numero}" class="form-control bg-light" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Capacidad (Personas):</label>
                        <input type="number" th:field="*{capacidad}" class="form-control" min="1" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ubicación:</label>
                        <select th:field="*{ubicacion}" class="form-select" required>
                            <option value="Interior">Interior 🏠</option>
                            <option value="Terraza">Terraza ☀️</option>
                            <option value="Barra">Barra 🍺</option>
                            <option value="Ventana">Ventana 🪟</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Estado Actual:</label>
                        <select th:field="*{estado}" class="form-select" required>
                            <option value="LIBRE">Libre 🟢</option>
                            <option value="OCUPADA">Ocupada 🔴</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/mesas}" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-xmark me-1"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
