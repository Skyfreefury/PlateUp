<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Mesa | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/mesas}'|">Volver a Mesas</button>
</nav>

<section class="dashboard-section reveal" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 150px;">
    <div class="card" style="background: var(--dark); padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 500px;">
        <span class="section-tag" style="text-align: center;">Logística del Local</span>
        <h3 style="font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 32px; margin-bottom: 30px; font-weight: 300; text-align: center;">Configurar <em>Mesa</em></h3>
        
        <form th:action="@{/mesas/editar/{id}(id=${mesa.id})}" th:object="${mesa}" method="post" class="reserva-form">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="form-label">Capacidad (Personas)</label>
                <input type="number" th:field="*{capacidad}" class="form-input" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Ubicación</label>
                    <select th:field="*{ubicacion}" class="form-select">
                        <option value="Interior">Interior 🏠</option>
                        <option value="Terraza">Terraza ☀️</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Estado de la Mesa</label>
                    <select th:field="*{estado}" class="form-select">
                        <option value="LIBRE">Libre 🟢</option>
                        <option value="OCUPADA">Ocupada 🔴</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <a th:href="@{/mesas}" class="btn-secondary" style="width: 50%; text-align: center; text-decoration: none;">Cancelar</a>
                <button type="submit" class="btn-primary" style="width: 50%;"><span>Actualizar</span></button>
            </div>
        </form>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
