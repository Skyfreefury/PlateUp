<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comandas | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo" style="font-size: 18px; letter-spacing: 0.15em;">Eclipse PlateUp</a>
    <ul class="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}" style="color: var(--gold);">Comandas</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
    </ul>
    <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Volver al Inicio</button>
</nav>

<section class="dashboard-section reveal">
    <div class="dashboard-grid">
        <div class="card" style="background: var(--dark); padding: 40px; border: 1px solid var(--border);">
            <span class="section-tag">Servicio</span>
            <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300;">Marchar <em>Plato</em></h3>
            <form th:action="@{/comandas/guardar}" method="post" th:object="${comanda}" class="reserva-form">
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label class="form-label">Cuenta ID (Pedido)</label>
                    <input type="number" th:field="*{pedidoId}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Nombre del Plato</label>
                    <input type="text" th:field="*{nombrePlato}" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Cantidad</label>
                    <input type="number" th:field="*{cantidad}" class="form-input" required min="1" />
                </div>
                <div class="form-group">
                    <label class="form-label">Estado</label>
                    <input type="text" th:field="*{estado}" class="form-input" placeholder="EN PREPARACIÓN, LISTO..." />
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;"><span>Marchar</span></button>
            </form>
        </div>
        <div>
            <span class="section-tag">Cocina</span>
            <h2 class="section-title">Comandas <em>en Curso</em></h2>
            <table class="solstice-table">
                <thead>
                    <tr>
                        <th>Cuenta</th>
                        <th>Plato</th>
                        <th>Cant.</th>
                        <th>Estado</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${comandas}">
                        <td th:text="${c.pedidoId}"></td>
                        <td th:text="${c.nombrePlato}"></td>
                        <td th:text="${c.cantidad}"></td>
                        <td><span class="badge-solstice badge-gold" th:text="${c.estado}"></span></td>
                        <td style="text-align: right;">
                            <div class="action-buttons">
                                <a th:href="@{/comandas/editar/{id}(id=${c.id})}" class="btn-icon btn-edit"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></a>
                                <a th:href="@{/comandas/eliminar/{id}(id=${c.id})}" class="btn-icon btn-delete"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
