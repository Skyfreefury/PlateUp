<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Abrir Cuenta | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=6.4}">
</head>
<body>

<nav id="navbar" class="scrolled">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/pedidos}'|">Volver a Cuentas</button>
</nav>

<section class="reveal visible form-section">
    <div class="card form-card">
        <span class="section-tag text-center">Facturación</span>
        <h3 class="form-title">Abrir <em>Cuenta</em></h3>
        
        <form th:action="@{/pedidos/guardar}" method="post" th:object="${pedido}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label class="form-label">Asignar Mesa</label>
                <select th:field="*{mesaId}" class="form-input" required>
                    <option value="" disabled selected>-- Seleccione una mesa --</option>
                    <option th:each="m : ${mesas}" th:value="${m.id}" 
                            th:text="'Mesa #' + ${m.numero} + ' (' + ${m.ubicacion} + ')'"></option>
                </select>
            </div>
            
            <div class="form-group mb-40">
                <label class="form-label">Asignar Cliente</label>
                <select th:field="*{clienteId}" class="form-input" required>
                    <option value="" disabled selected>-- Seleccione un cliente --</option>
                    <option th:each="c : ${clientes}" th:value="${c.id}" 
                            th:text="${c.nombre}"></option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary w-100"><span>Abrir Cuenta</span></button>
        </form>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
