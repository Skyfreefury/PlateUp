<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Cuenta | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=20.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn-icon btn-circle">
            <span id="theme-icon">☀️</span>
        </button>
        <button class="nav-cta" onclick="history.back()">Volver Atrás</button>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="nav-cta">🔒 Salir</button>
        </form>
    </div>
</nav>

<section class="reveal visible form-section">
    <div class="card form-card">
        <span class="section-tag text-center">Apertura</span>
        <h3 class="form-title">Nueva <em>Cuenta</em></h3>
        
        <form th:action="@{/pedidos/guardar}" method="post" th:object="${pedido}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{sesionId}" />
            <input type="hidden" th:field="*{estado}" />
            <input type="hidden" th:field="*{fechaHora}" />
            <input type="hidden" th:field="*{total}" />
            <input type="hidden" th:field="*{numeroTicket}" />
            <input type="hidden" th:field="*{clienteId}" />
            <div class="form-group mb-40">
                <label class="form-label">Mesa</label>
                <select th:field="*{mesaId}" class="form-input" required>
                    <option value="" disabled selected>-- Seleccione Mesa --</option>
                    <option th:each="m : ${mesas}" th:value="${m.id}" th:text="'Mesa ' + ${m.id} + ' (' + ${m.capacidad} + ' comensales)'"></option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-100"><span>Abrir Cuenta</span></button>
        </form>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
