<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Comanda | PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/comandas}">⬅ Volver a Comandas</a>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 500px;">
            <div class="card-header bg-warning text-dark py-3">
                <h3 class="h5 mb-0 fw-bold">✏️ Editar Comanda</h3>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/comandas/guardar}" th:object="${comanda}" method="post">
                    
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">ID del Pedido:</label>
                        <input type="number" th:field="*{pedidoId}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Plato:</label>
                        <select th:field="*{nombrePlato}" class="form-select" required>
                            <option th:each="p : ${productos}" th:value="${p.nombre}" th:text="${p.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Cantidad:</label>
                        <input type="number" th:field="*{cantidad}" class="form-control" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Notas de Cocina:</label>
                        <textarea th:field="*{comentarios}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Estado:</label>
                        <select th:field="*{estado}" class="form-select form-select-lg" required>
                            <option value="PENDIENTE">Pendiente 📝</option>
                            <option value="EN PREPARACION">En Preparación 🍳</option>
                            <option value="LISTO">Listo 🔔</option>
                            <option value="ENTREGADO">Entregado ✅</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/comandas}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
