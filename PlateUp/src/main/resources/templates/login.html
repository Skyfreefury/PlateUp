<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Acceso al panel de gestión interno de Eclipse PlateUp." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Acceso | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=11.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>

<section class="reveal visible form-section" style="min-height:100vh; display:flex; align-items:center;">
    <div class="card form-card" style="max-width:420px; width:100%;">

        <div style="text-align:center; margin-bottom:24px;">
            <span class="section-tag">Eclipse PlateUp</span>
            <h3 class="form-title" style="margin-top:8px;">Acceso al <em>Panel</em></h3>
        </div>

        <!-- Mensaje de error -->
        <div th:if="${param.error}" class="alert" style="background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.4); color:#ff6b6b; padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:0.9rem;">
            Usuario o contraseña incorrectos.
        </div>

        <!-- Mensaje de logout -->
        <div th:if="${param.logout}" class="alert" style="background:rgba(40,167,69,0.15); border:1px solid rgba(40,167,69,0.4); color:#51cf66; padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:0.9rem;">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post" class="reserva-form">
            <div class="form-group mb-25">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-input" placeholder="Introduce tu usuario" required autofocus />
            </div>
            <div class="form-group mb-40">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn-primary w-100"><span>Entrar</span></button>
        </form>

        <div style="text-align:center; margin-top:24px;">
            <a th:href="@{/}" style="color:var(--text-muted); font-size:0.85rem;">← Volver al inicio</a>
        </div>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
