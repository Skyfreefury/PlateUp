<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha de Cliente | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=6.1}">
</head>
<body>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/clientes}'|">Volver a Clientes</button>
</nav>

<section class="reveal visible" style="padding: 40px 5%; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="background: var(--dark); padding: 50px; border: 1px solid var(--border); width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
        
        <span class="section-tag" style="text-align: center;">Base de Datos</span>
        <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; text-align: center; margin-bottom: 40px; color: var(--white);">
            Ficha de <em>Cliente</em>
        </h3>
        
        <form th:action="@{/clientes/guardar}" method="post" th:object="${cliente}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label">Nombre Completo</label>
                <input type="text" th:field="*{nombre}" class="form-input" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" th:field="*{email}" class="form-input" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 40px;">
                <label class="form-label">Teléfono de Contacto</label>
                <input type="tel" th:field="*{telefono}" class="form-input" />
            </div>
            
            <button type="submit" class="btn-primary w-100"><span>Guardar Cliente</span></button>
        </form>
    </div>
</section>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
