<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ficha de Cliente | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=21.0}">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <button class="nav-cta" th:onclick="|window.location.href='@{/clientes}'|">Volver a Clientes</button>
</nav>

<section class="reveal visible form-section">
    <div class="form-card">
        <span class="section-tag text-center">Base de Datos</span>
        <h3 class="form-title">Ficha de <em>Cliente</em></h3>

        <form th:action="@{/clientes/guardar}" method="post" th:object="${cliente}" class="reserva-form">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label class="form-label">Nombre Completo</label>
                <input type="text" th:field="*{nombre}" class="form-input" required />
            </div>

            <div class="form-group">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" th:field="*{email}" class="form-input" required />
            </div>

            <div class="form-group mb-40">
                <label class="form-label">Teléfono de Contacto</label>
                <input type="tel" th:field="*{telefono}" class="form-input" />
            </div>

            <button type="submit" class="btn-primary w-100">Guardar Cliente</button>
        </form>
    </div>
</section>

<div class="toast" id="toast"></div>
<div id="error-msg" th:if="${error}" th:text="${error}" style="display:none"></div>
<script th:src="@{/js/main.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('error-msg');
        if (el) showToast('✖ ' + el.textContent);
    });
</script>
</body>
</html>
