<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Panel de barra y servicio de bebidas — Eclipse PlateUp." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Panel de Barra | Eclipse PlateUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=13.0}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<header>
<nav id="navbar" class="scrolled dashboard-nav">
    <a th:href="@{/}" class="nav-logo">Eclipse PlateUp</a>
    <button class="mobile-menu-btn" id="burger-btn" aria-label="Menú">
        <svg viewBox="0 0 100 80" width="24" height="24" fill="var(--gold)">
            <rect width="100" height="10" rx="5"></rect>
            <rect y="35" width="100" height="10" rx="5"></rect>
            <rect y="70" width="100" height="10" rx="5"></rect>
        </svg>
    </button>
    <ul class="nav-links" id="nav-links">
        <li><a th:href="@{/mesas}">Mesas</a></li>
        <li><a th:href="@{/pedidos}">Cuentas</a></li>
        <li><a th:href="@{/comandas}">Cocina</a></li>
        <li><a th:href="@{/barra}" class="text-gold">Barra</a></li>
        <li><a th:href="@{/productos}">Carta</a></li>
        <li><a th:href="@{/clientes}">Clientes</a></li>
        <li><a th:href="@{/cierre}">Caja</a></li>
    </ul>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn-icon btn-circle" title="Cambiar Tema">
            <span id="theme-icon">☀️</span>
        </button>
        <button class="nav-cta" th:onclick="|window.location.href='@{/}'|">Inicio</button>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="nav-cta">🔒 Salir</button>
        </form>
    </div>
</nav>
</header>

<main>
<section class="reveal dashboard-container pt-section" id="main-content">
    <div class="dashboard-header reveal">
        <div>
            <span class="section-tag section-tag-cyan">Servicio de Bebidas</span>
            <h2 class="section-title m-0">Estado de <em>Barra</em></h2>
        </div>
        <a th:href="@{/comandas/nuevo(from='barra')}" class="btn-primary btn-link-action">+ Marchar Bebida</a>
    </div>

    <div class="comanda-section-title reveal"><h3 class="comanda-title">🍹 Bebidas Pendientes</h3></div>
    <div class="table-responsive reveal">
        <table class="solstice-table w-100">
            <thead><tr><th>Mesa</th><th>Bebida</th><th>Cant.</th><th>Tiempo Espera</th><th class="text-right">Acción</th></tr></thead>
            <tbody>
                <tr th:each="c : ${comandas}" th:if="${c.tipoComandaId == 4 and c.estado != 'LISTO'}">
                    <td data-label="Mesa" th:with="p=${pedidosMap != null ? pedidosMap[c.pedidoId] : null}, m=${p != null and mesaMap != null ? mesaMap[p.mesaId] : null}">
                        <span th:if="${p != null and p.mesaAnteriorId != null}" class="mesa-cambiada">
                            <strong>Mesa <span th:text="${p.mesaId}">?</span></strong>
                            <span th:if="${m != null}" class="badge-ubicacion" th:classappend="${m.ubicacion == 'TERRAZA'} ? ' badge-terraza' : ' badge-salon'" th:text="${m.ubicacion == 'TERRAZA'} ? 'Terraza' : 'Salón'"></span>
                            <span class="badge-mesa-cambio">&#8592; era <span th:text="${p.mesaAnteriorId}">?</span></span>
                        </span>
                        <span th:unless="${p != null and p.mesaAnteriorId != null}">
                            <strong>Mesa <span th:text="${p != null ? p.mesaId : '?'}">?</span></strong>
                            <span th:if="${m != null}" class="badge-ubicacion" th:classappend="${m.ubicacion == 'TERRAZA'} ? ' badge-terraza' : ' badge-salon'" th:text="${m.ubicacion == 'TERRAZA'} ? 'Terraza' : 'Salón'"></span>
                        </span>
                        <br><small class="text-muted">#<span th:text="${c.pedidoId}">?</span></small>
                    </td>
                    <td data-label="Bebida" class="text-cyan" th:text="${c.nombrePlato}"></td>
                    <td data-label="Cant." th:text="'x' + ${c.cantidad}"></td>
                    <td data-label="Espera"><span class="wait-time" th:data-start="${c.creadoEn}">Calculando...</span></td>
                    <td data-label="Acción" class="text-right">
                        <a th:href="@{/comandas/listo/{id}(id=${c.id})}" class="btn-icon btn-icon-success" title="¡Bebida Lista!">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.41 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</main>

<footer>
    <div style="text-align:center; padding:16px; font-size:0.8rem; opacity:0.5;">© 2026 Eclipse PlateUp</div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
