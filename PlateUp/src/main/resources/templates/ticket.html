<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Ticket de cuenta generado por Eclipse PlateUp." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Ticket Mesa | Eclipse PlateUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css?v=18.0}">
</head>
<body class="ticket-page-body">

<div class="ticket-container">
    <div class="ticket-header">
        <h2>ECLIPSE PLATEUP</h2>
        <p>Alta Cocina & Experiencias</p>
        <p>Av. de la Gastronomía, 123</p>
        <div class="ticket-divider"></div>

        <p class="ticket-num" th:text="'Ticket Nº: ' + (${pedido.numeroTicket != null ? pedido.numeroTicket : pedido.id})"></p>
        <p th:text="'Mesa: ' + ${pedido.mesaId}"></p>
        <p th:text="'Fecha: ' + (${pedido.fechaHora != null} ? ${#temporals.format(pedido.fechaHora, 'dd/MM/yyyy HH:mm')} : '-')"></p>
    </div>

    <div class="ticket-divider"></div>
    <p class="ticket-col-header">CANT.   CONCEPTO</p>

    <div th:each="c : ${comandas}" class="ticket-item">
        <div class="item-name" th:text="(${c.cantidad != null} ? ${c.cantidad} : '?') + 'x ' + (${c.nombrePlato != null} ? ${c.nombrePlato} : 'Producto')"></div>
    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-total">
        TOTAL: <span th:text="${pedido.total} + ' €'"></span>
    </div>

    <div class="ticket-header">
        <p>¡Gracias por su visita!</p>
        <p>Le esperamos pronto.</p>
    </div>
</div>

<div class="ticket-actions">
    <button onclick="window.print()" class="btn-primary btn-ticket">
        🖨️ Imprimir Ticket
    </button>
    <a th:href="@{/pedidos}" class="btn-outline btn-ticket">
        Volver a Cuentas
    </a>
</div>

</body>
</html>
