# Nombre de la aplicaci\u00f3n
spring.application.name=PlateUp

# Conexi\u00f3n a la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3307/restaurante_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=plateup
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Forzamos el dialecto MODERNO de Spring Boot 3 / Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuraci\u00f3n Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto
server.port=8080